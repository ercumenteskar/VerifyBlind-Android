name: Mobile Release Build (Deterministic & Code Transparency)

on:
  push:
    branches: [ "main" ] 
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set SOURCE_DATE_EPOCH for Reproducible Builds
        run: |
          COMMIT_TIME=$(git log -1 --pretty=%ct)
          echo "SOURCE_DATE_EPOCH=$COMMIT_TIME" >> $GITHUB_ENV
          echo "Build Time Epoch: $COMMIT_TIME"

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: 'gradle/wrapper/gradle-wrapper.properties'

      - name: Make scripts executable
        run: chmod +x gradlew

      - name: Build Unsigned AAB
        run: ./gradlew bundleRelease -Dorg.gradle.java.home=$JAVA_HOME_17_X64 --no-daemon

      - name: Read Version Info
        run: |
          VERSION_CODE=$(grep versionCode app/version.properties | cut -d= -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep -o 'currentVersionName = "[^"]*"' app/build.gradle.kts | cut -d'"' -f2)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo ">>> Version: $VERSION_NAME (Build $VERSION_CODE)"

      - name: Extract DEX Hashes & Generate dex-hashes.json
        run: |
          unzip -q app/build/outputs/bundle/release/app-release.aab "base/dex/*.dex" -d extracted_dex

          cat > dex-hashes.json << EOF
          {
            "version_code": $VERSION_CODE,
            "version_name": "$VERSION_NAME",
            "git_commit": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "dex_hashes": {
          EOF

          FIRST=1
          for dex in $(ls extracted_dex/base/dex/*.dex | sort); do
              HASH=$(sha256sum "$dex" | awk '{print $1}')
              FILENAME=$(basename "$dex")
              if [ $FIRST -eq 1 ]; then
                  FIRST=0
              else
                  echo "," >> dex-hashes.json
              fi
              printf '    "%s": "%s"' "$FILENAME" "$HASH" >> dex-hashes.json
          done

          cat >> dex-hashes.json << EOF

            }
          }
          EOF

          echo ">>> dex-hashes.json:"
          cat dex-hashes.json

      - name: Generate Build Transparency Report
        run: |
          echo "### VerifyBlind Deterministic Build Transparency Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION_NAME (Build $VERSION_CODE)" >> $GITHUB_STEP_SUMMARY
          echo "- **SOURCE_DATE_EPOCH:** $SOURCE_DATE_EPOCH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### DEX Hash'leri:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          for dex in $(ls extracted_dex/base/dex/*.dex | sort); do
              HASH=$(sha256sum "$dex" | awk '{print $1}')
              FILENAME=$(basename "$dex")
              echo "$HASH  $FILENAME" >> $GITHUB_STEP_SUMMARY
          done
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Manuel Doğrulama:" >> $GITHUB_STEP_SUMMARY
          echo "1. \`adb shell pm path com.verifyblind.mobile\` ile APK yolunu bulun" >> $GITHUB_STEP_SUMMARY
          echo "2. \`adb pull /data/app/.../base.apk\` ile çekin" >> $GITHUB_STEP_SUMMARY
          echo "3. \`unzip -q base.apk \"*.dex\" -d dex && sha256sum dex/*.dex\` ile karşılaştırın" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$VERSION_CODE"
          TITLE="VerifyBlind v$VERSION_NAME (Build $VERSION_CODE)"
          BODY="**Commit:** [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          **Version:** $VERSION_NAME (Build $VERSION_CODE)

          ---

          Bu release'e ekli \`dex-hashes.json\` dosyası, bu commit'ten derlenen uygulamanın DEX bileşen hash'lerini içerir.

          Telefonunuzdaki uygulamanın bu koddan üretildiğini doğrulamak için \`verify/\` klasöründeki scripti çalıştırın."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            --repo "${{ github.repository }}" \
            dex-hashes.json

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: verifyblind-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
